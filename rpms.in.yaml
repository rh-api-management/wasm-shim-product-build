contentOrigin:
  repofiles:
    - ./ubi.repo
    - ./redhat.repo
context:
  image: registry.redhat.io/ubi9/ubi:latest
packages:
  - cargo
  - rust-toolset
  - llvm-toolset
  - gcc-c++
  - gcc-toolset-12-binutils-gold
  - protobuf-devel
  - protobuf-compiler
  - rust-std-static-wasm32-wasip1
  - openssl-devel
  - perl
  - git
  - shadow-utils
  - libgcc
arches: [x86_64, aarch64]
